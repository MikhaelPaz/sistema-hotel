<!DOCTYPE html>
<html>
<head>
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Cadastrar Hóspede</h1>

    <input type="text" id="nome" placeholder="Nome do Hóspede">
    <input type="number" id="quarto" placeholder="Número do Quarto">
    <input type="number" id="valor_diaria" placeholder="Valor da Diária">
    <br>

    <button onclick="cadastrar()">Cadastrar</button>

    <h2 id="tlista">Lista de Hóspedes</h2>
<!-- Troque a <ul> por esta tabela abaixo -->
<table>
    <thead>
        <tr>
            <th>Nome</th>
            <th>Quarto</th>
            <th>Diária</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody id="tabela">
        <!-- O JavaScript vai preencher os dados aqui dentro -->
    </tbody>
</table>

    <a href="index.html">Voltar ao Dashboard</a>

    <script src="script.js"></script>
</div>
</body>
</html>
